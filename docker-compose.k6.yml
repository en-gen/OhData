services:
  testbench:
    build:
      context: .
      dockerfile: src/OhData.TestBench.AspNetCore/Dockerfile
    environment:
      ASPNETCORE_URLS: http://+:8080
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 12

  k6:
    image: grafana/k6:latest
    depends_on:
      testbench:
        condition: service_healthy
    volumes:
      - ./k6:/scripts
      - ./k6/reports:/reports
    command: run --out json=/reports/results.json /scripts/smoke.js
    environment:
      BASE_URL: http://testbench:8080
