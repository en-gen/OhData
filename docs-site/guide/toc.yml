# UNIFIED nested toc for the whole OhData documentation site (issue #208).
#
# WHY THIS EXISTS: in the DocFX modern template the ROOT toc (docs-site/toc.yml) renders as the
# horizontal TOP NAVBAR, while a page's *owning* nested toc renders in the LEFT SIDEBAR — but only
# when the two differ (verified against generated HTML: modern hides the sidebar when a page's
# docfx:tocrel equals its docfx:navrel). To get ONE left tree on EVERY page — Home included — we
# keep the root toc empty (navbar = just logo/search/theme/GitHub, no section tabs) and route ALL
# content, plus the home page, into guide/ so this toc (output guide/toc.html) is their nearest
# owning toc and modern renders it on the left.
#
# SINGLE-SOURCING: content is still single-sourced. This toc lives one level deep
# (docs-site/guide/), so the repo's docs/ guides are referenced as ../../docs/*.md and the local
# draft pages (sources at docs-site/ root) as ../*.md. No content is copied or moved; only OUTPUT
# is relocated under guide/ (docfx.json `dest`), and DocFX rewrites relative links to match.
#
# Group nodes (Getting started, Modeling, Client, Companions, ...) have items but no href, so the
# modern template renders them as expandable/collapsible section headers.

- name: Home
  href: ../index.md

- name: Server
  items:
    - name: Getting started
      items:
        - name: Installation & quick start
