# NESTED toc for the "Server" product tab (issue #208) - renders in the modern LEFT SIDEBAR.
#
# This toc owns the OhData.AspNetCore server guides. Its pages output into this server/
# folder (docfx.json `dest`), so server/toc.html is their nearest toc (docfx:tocrel) and
# the modern template renders it as the collapsible left tree - distinct from the root toc,
# which is the top navbar.
#
# SINGLE-SOURCING: content is still single-sourced. Because this toc lives one level deep
# (docs-site/server/), the repo's docs/ guides are referenced as ../../docs/*.md, and the
# two local draft pages (sources at docs-site/ root) as ../*.md. No content was copied or
# moved; only OUTPUT is relocated into server/, and DocFX rewrites relative links to match.
#
# Group nodes (Getting started, Modeling, ...) have items but no href, so the modern
# template renders them as expandable section headers.

- name: Getting started
  items:
    - name: Installation & quick start
      href: ../getting-started.md
    - name: EF Core + SQLite tutorial
      href: ../ef-core-sqlite.md
    - name: Migrating from Microsoft.AspNetCore.OData
      href: ../../docs/migrating-from-microsoft-odata.md

