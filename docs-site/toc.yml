# Site navigation for the OhData documentation site (issue #208).
#
# Content is single-sourced: every href prefixed with ../docs/ resolves to a file under the
# repository's docs/ folder, glob-referenced in place by docfx.json (no copies). Editing
# docs/*.md updates the site automatically. The ../docs/ prefix is required because DocFX keys
# files by their path from the common base directory (the repo root), so from docs-site/ the
# guides live one level up under docs/. Output URLs are still flat (e.g. /architecture.html).
#
# The three draft pages (index.md, getting-started.md, ef-core-sqlite.md) live in docs-site/
# itself and are referenced without the prefix.

- name: Home
  href: index.md

- name: Getting Started
  items:
