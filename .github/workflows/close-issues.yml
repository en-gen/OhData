name: Close linked issues on PR merge

# GitHub's built-in "Closes #X" keyword only fires when a PR merges to the
# DEFAULT branch (main). This workflow closes linked issues on merge to any
# branch so GitFlow feature PRs targeting develop auto-close their issues.

on:
  pull_request:
    types: [closed]

jobs:
  close-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const body = context.payload.pull_request.body || '';
            const pattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
            let match;
            while ((match = pattern.exec(body)) !== null) {
              const issueNumber = parseInt(match[1]);
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                state: 'closed',
              });
              core.info(`Closed #${issueNumber}`);
            }
