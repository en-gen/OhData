name: CI

on:
  push:
    branches: [main, develop, 'release/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    env:
      HUSKY: 0   # skip git hook installation in CI

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # GitVersion needs full history

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.x

      - name: Restore
        run: dotnet restore src/OhData.sln

      - name: Format check
        run: dotnet format src/OhData.sln --verify-no-changes

      - name: Build
        run: dotnet build src/OhData.sln --no-restore -c Release

      - name: Test with coverage
        run: |
          dotnet test src/OhData.AspNetCore.Tests/OhData.AspNetCore.Tests.csproj \
            --no-build -c Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage
          dotnet test src/OhData.Client.Tests/OhData.Client.Tests.csproj \
            --no-build -c Release \
            --collect:"XPlat Code Coverage" \
            --results-directory ./coverage

      - name: Pack (dry run)
        run: |
          dotnet pack src/OhData.AspNetCore/OhData.AspNetCore.csproj \
            --no-build -c Release \
            -p:Version="0.0.0-ci" \
            -o ./nupkg-ci
          dotnet pack src/OhData.Client/OhData.Client.csproj \
            --no-build -c Release \
            -p:Version="0.0.0-ci" \
            -o ./nupkg-ci

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          directory: ./coverage
          fail_ci_if_error: false
